<!-- Ejemplo de plantilla HTML para detalle de una salida -->
<!-- Copie este archivo como {ID_Curso}.html (ej: 15.html) para asignar el detalle a la salida con ese ID -->
<!-- El contenido se cargará automáticamente cuando el usuario seleccione esa salida en el formulario -->
<div class="salida-detalle card mt-3 border-primary">
    <div class="card-body">
        <h6 class="card-title text-primary">Detalle de la salida</h6>
        <p>Aquí puede colocar descripción, requisitos, itinerario, qué llevar, etc.</p>
        <ul>
            <li>Punto de encuentro</li>
            <li>Hora de salida</li>
            <li>Recomendaciones</li>
        </ul>
    </div>
</div>
